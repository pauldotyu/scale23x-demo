apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: chat
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: git@github.com:pauldotyu/scale23x-demo.git
    targetRevision: HEAD
    path: manifests/apps/chat/overlays/direct
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  # Manual sync - deploy this during the demo via Argo CD UI
  # To enable auto-sync, uncomment the syncPolicy below:
  # syncPolicy:
  #   automated:
  #     prune: true
  #     selfHeal: true
